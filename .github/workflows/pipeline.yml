name: DevOps Lifecycle Pipeline

on:
  push:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Test
        run: mvn clean verify # Esto corre tests y Jacoco

      - name: Build Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker build -t ${{ secrets.DOCKER_USER }}/devops-app:${{ github.sha }} .

      - name: Push to DockerHub
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
          docker push ${{ secrets.DOCKER_USER }}/devops-app:${{ github.sha }}

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Copy K8s manifests to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "k8s/"
          target: "/home/ubuntu/app/"

      - name: Deploy to K8s
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Actualizar la imagen en el manifiesto dinámicamente
            sed -i 's|image:.*|image: ${{ secrets.DOCKER_USER }}/devops-app:${{ github.sha }}|g' /home/ubuntu/app/k8s/deployment.yaml
            sudo kubectl apply -f /home/ubuntu/app/k8s/deployment.yaml
            sudo kubectl apply -f /home/ubuntu/app/k8s/service.yaml
            sudo kubectl apply -f /home/ubuntu/app/k8s/hpa.yaml